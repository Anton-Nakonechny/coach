<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Claude Chat</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
    <div class="container">
        <header>
            <h1>Claude Chat</h1>
        </header>

        <div class="main-content">
            <!-- Left Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <button id="newChatButton" class="new-chat-button">+ New Chat</button>
                </div>

                <!-- Model selection -->
                <div class="sidebar-section">
                    <div class="sidebar-label">Model</div>
                    <div class="model-buttons" id="modelButtons"></div>
                </div>

                <!-- Effort level -->
                <div class="sidebar-section">
                    <div class="sidebar-label">Effort</div>
                    <select id="effortSelect" class="effort-select"></select>
                    <p class="effort-note" id="effortNote"></p>
                </div>

                <!-- Past conversations -->
                <div class="sidebar-section">
                    <div class="sidebar-label history-header">
                        <button id="clearAllButton" class="icon-button" title="Clear all history" aria-label="Clear all history">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 3 L11 13"></path>
                                <path d="M8.5 10.5 L13.5 15.5"></path>
                                <path d="M11 13 L3 18"></path>
                                <path d="M13.5 15.5 L7 21"></path>
                                <path d="M3 18 L7 21"></path>
                                <path d="M9.7 14.3 L5 19"></path>
                            </svg>
                        </button>
                        <span>History</span>
                    </div>
                    <div class="conversation-list" id="conversationList"></div>
                </div>
            </aside>

            <!-- Main Chat Area -->
            <main class="chat-main">
                <div class="chat-container">
                    <div id="chatMessages" class="chat-messages"></div>
                    <div class="chat-input-container">
                        <input type="file" id="fileInput" multiple accept="image/*,.pdf,.txt,.md,.csv,.json,.xml,.zip" hidden>
                        <button id="attachButton" class="icon-button" aria-label="Attach files">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                            </svg>
                        </button>
                        <div class="chat-input-inner">
                            <div id="attachmentStrip" class="attachment-strip" hidden></div>
                            <div id="composerError" class="composer-error" aria-live="polite"></div>
                            <textarea
                                id="chatInput"
                                rows="1"
                                placeholder="Message Claude..."
                                autocomplete="off"
                            ></textarea>
                        </div>
                        <button id="sendButton">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                        <div id="dropOverlay" class="drop-overlay" hidden aria-hidden="true">
                            <span>⬇ Drop files to attach</span>
                            <span class="drop-hint">images · PDF · text/code · zip</span>
                        </div>
                    </div>
                </div>
            </main>

            <!-- Right coach panel -->
            <aside class="coach-panel">
                <div class="sidebar-section">
                    <div class="sidebar-label">Coach</div>
                    <div class="coach-options">
                        <label><input type="radio" name="coach" value="none" checked> None</label>
                        <label><input type="radio" name="coach" value="chief-operating-officer"> Chief Operating Officer</label>
                        <label><input type="radio" name="coach" value="spanish"> Español</label>
                    </div>
                    <p id="coachNote" class="coach-note" aria-live="polite"></p>
                </div>
            </aside>
        </div>
    </div>

    <script src="marked.min.js?v=1"></script>
    <script src="script.js?v=5"></script>
</body>
</html>
